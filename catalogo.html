<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Catálogo — Estación Snack</title>
<meta name="description" content="Frutos secos, confites y dulces por kilo. Despacho en Santa Cruz.">
<meta name="theme-color" content="#1A1A2E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#E85D3A;--primary-hover:#D14E2D;--primary-light:#FFF0EC;
  --dark:#1A1A2E;--dark-soft:#2D2D42;
  --accent:#FFD23F;--accent-soft:#FFF8E1;
  --green:#3D8B37;--green-light:#E8F5E8;
  --wa:#25D366;
  --bg:#FAFAF8;--surface:#FFFFFF;
  --n50:#FAFAF8;--n100:#F5F5F0;--n200:#E8E8E0;--n300:#D4D4CC;
  --n400:#A8A89C;--n500:#8A8A7E;--n600:#6B6B60;--n800:#2D2D28;--n900:#1A1A16;
  --shadow-sm:0 1px 3px rgba(0,0,0,.06);
  --shadow-md:0 4px 12px rgba(0,0,0,.07);
  --shadow-lg:0 12px 32px rgba(0,0,0,.1);
  --r:12px;--r-lg:16px;--r-xl:24px;--r-full:9999px;
  --ease:cubic-bezier(.32,.72,0,1);--spring:cubic-bezier(.34,1.56,.64,1)
}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--n900);min-height:100dvh;-webkit-font-smoothing:antialiased}
h1,h2,h3,.display{font-family:'Space Grotesk',system-ui,sans-serif}
button,a{-webkit-tap-highlight-color:transparent;touch-action:manipulation;cursor:pointer;text-decoration:none;border:none;font-family:inherit;color:inherit}
img{display:block;max-width:100%}
input,textarea{font-family:inherit}

/* ═══ CONTAINER ═══ */
.container{max-width:1200px;margin:0 auto;padding:0 16px}
@media(min-width:768px){.container{padding:0 32px}}
@media(min-width:1024px){.container{padding:0 48px}}

/* ═══ HEADER ═══ */
.hdr{position:sticky;top:0;z-index:100;background:var(--dark);color:#fff}
.hdr-inner{max-width:1200px;margin:0 auto;padding:0 16px;height:60px;display:flex;align-items:center;justify-content:space-between}
@media(min-width:768px){.hdr-inner{padding:0 32px;height:64px}}
.hdr-left{display:flex;align-items:center;gap:12px}
.hdr-back{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:8px;background:rgba(255,255,255,.1);transition:background .15s}
.hdr-back:active,.hdr-back:hover{background:rgba(255,255,255,.18)}
.hdr-back svg{width:18px;height:18px}
.hdr-brand{font-family:'Space Grotesk';font-size:18px;font-weight:700;letter-spacing:-.5px}
@media(min-width:768px){.hdr-brand{font-size:20px}}
.hdr-nav{display:none}
@media(min-width:768px){
  .hdr-nav{display:flex;align-items:center;gap:28px}
  .hdr-nav a{font-size:14px;font-weight:600;color:rgba(255,255,255,.6);transition:color .15s}
  .hdr-nav a:hover,.hdr-nav a.cur{color:#fff}
}
.hdr-right{display:flex;align-items:center;gap:8px}
.hdr-cart{position:relative;display:flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:8px;background:rgba(255,255,255,.1);transition:background .15s}
.hdr-cart:hover{background:rgba(255,255,255,.18)}
.hdr-cart svg{width:20px;height:20px}
.hdr-badge{position:absolute;top:0;right:0;min-width:18px;height:18px;padding:0 5px;background:var(--primary);color:#fff;font-size:10px;font-weight:800;border-radius:var(--r-full);display:flex;align-items:center;justify-content:center;border:2px solid var(--dark);transform:scale(0);transition:transform .3s var(--spring)}
.hdr-badge.show{transform:scale(1)}
.hdr-wa{display:none;align-items:center;gap:8px;padding:8px 18px;border-radius:var(--r-full);background:var(--wa);color:#fff;font-size:13px;font-weight:700;transition:transform .15s var(--spring)}
.hdr-wa:hover{transform:scale(1.03)}
.hdr-wa svg{width:16px;height:16px}
@media(min-width:768px){.hdr-wa{display:flex}}

/* ═══ TRUST ═══ */
.trust{background:var(--accent-soft);border-bottom:1px solid rgba(0,0,0,.04)}
.trust-inner{max-width:1200px;margin:0 auto;padding:10px 16px;display:flex;align-items:center;justify-content:center;gap:16px;font-size:12px;font-weight:600;color:var(--n600);flex-wrap:wrap}
@media(min-width:768px){.trust-inner{gap:32px;font-size:13px}}
.trust-inner span{display:flex;align-items:center;gap:5px;white-space:nowrap}

/* ═══ PAGE TOP ═══ */
.page-top{padding:24px 0 0}
@media(min-width:768px){.page-top{padding:40px 0 0}}
.page-top h1{font-size:clamp(26px,5vw,40px);font-weight:700;letter-spacing:-1px;line-height:1.05;margin-bottom:6px}
.page-top h1 em{font-style:normal;color:var(--primary)}
.page-top p{font-size:14px;color:var(--n500);line-height:1.5;max-width:420px}
@media(min-width:768px){.page-top p{font-size:15px}}

/* ═══ CONTROLS ═══ */
.controls{display:flex;gap:12px;align-items:center;padding:16px 0;flex-wrap:wrap}
@media(min-width:768px){.controls{padding:24px 0}}
.search{flex:1;min-width:200px;display:flex;align-items:center;gap:10px;background:var(--surface);border:1.5px solid var(--n200);border-radius:var(--r);padding:0 14px;height:44px;transition:border-color .2s}
.search:focus-within{border-color:var(--primary)}
.search svg{width:18px;height:18px;color:var(--n400);flex-shrink:0}
.search input{flex:1;border:none;outline:none;background:none;font-size:14px;font-weight:500;color:var(--n900)}
.search input::placeholder{color:var(--n400)}
.filters{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.filters::-webkit-scrollbar{display:none}
.pill{flex-shrink:0;padding:8px 18px;border-radius:var(--r-full);font-size:13px;font-weight:600;color:var(--n600);background:var(--surface);border:1.5px solid var(--n200);transition:all .2s;user-select:none}
.pill:active{transform:scale(.96)}
.pill.on{background:var(--dark);color:#fff;border-color:var(--dark)}

/* ═══ GRID ═══ */
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding-bottom:120px}
@media(min-width:640px){.grid{grid-template-columns:repeat(3,1fr);gap:16px}}
@media(min-width:1024px){.grid{grid-template-columns:repeat(4,1fr);gap:18px;padding-bottom:48px}}

/* ═══ CARD ═══ */
.card{background:var(--surface);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow-sm);border:2px solid transparent;transition:border-color .25s,box-shadow .3s,transform .2s var(--spring);position:relative}
.card:hover{box-shadow:var(--shadow-md);transform:translateY(-3px)}
.card:active{transform:scale(.98)}
.card.in{border-color:var(--green);box-shadow:0 0 0 2px rgba(61,139,55,.12),var(--shadow-md)}

.card-img{position:relative;aspect-ratio:1/1;background:var(--n100);overflow:hidden}
.card-img img{width:100%;height:100%;object-fit:contain;padding:8px;transition:transform .5s var(--ease)}
.card:hover .card-img img{transform:scale(1.06)}
.card-badges{position:absolute;top:8px;left:8px;right:8px;display:flex;justify-content:space-between;z-index:2}
.badge{padding:4px 10px;border-radius:var(--r-full);font-size:10px;font-weight:700;backdrop-filter:blur(8px)}
.badge-hot{background:var(--primary);color:#fff}
.badge-stock{background:rgba(255,255,255,.9);color:var(--n600)}
.card-check{width:24px;height:24px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;transform:scale(0);transition:transform .3s var(--spring)}
.card.in .card-check{transform:scale(1)}

.card-body{padding:12px 14px 14px}
@media(min-width:768px){.card-body{padding:14px 16px 16px}}
.card-cat{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--primary);margin-bottom:4px}
.card-name{font-family:'Space Grotesk';font-size:15px;font-weight:700;color:var(--n900);line-height:1.2;letter-spacing:-.2px;margin-bottom:2px}
@media(min-width:768px){.card-name{font-size:16px}}
.card-copy{font-size:12px;color:var(--n500);margin-bottom:8px;line-height:1.4}
.card-price{font-family:'Space Grotesk';font-size:20px;font-weight:700;color:var(--green);letter-spacing:-.3px;margin-bottom:12px}
.card-price small{font-size:12px;font-weight:500;color:var(--n400)}

.btn-add{width:100%;height:42px;border-radius:var(--r);font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:4px;background:var(--dark);color:#fff;transition:all .2s var(--spring)}
.btn-add:hover{background:var(--dark-soft)}
.btn-add:active{transform:scale(.95)}

.stepper{display:flex;align-items:center;width:100%;height:42px;border-radius:var(--r);overflow:hidden;background:var(--n100)}
.stp-btn{width:42px;height:42px;background:none;color:var(--n800);font-size:20px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .1s}
.stp-btn:hover{background:var(--n200)}
.stp-btn:disabled{opacity:.25;cursor:default}
.stp-val{flex:1;text-align:center;font-size:15px;font-weight:800}

.card-sub{display:flex;align-items:center;justify-content:space-between;padding:0 14px;height:0;opacity:0;overflow:hidden;transition:all .3s var(--ease)}
.card-sub.show{height:32px;opacity:1;padding:0 14px 12px}
.card-sub span{font-size:12px;font-weight:600;color:var(--green)}
.card-sub span:last-child{font-weight:800}

/* ═══ STICKY BAR (mobile) ═══ */
.bar{position:fixed;bottom:0;left:0;right:0;z-index:60;padding:12px 16px calc(14px + env(safe-area-inset-bottom));background:var(--dark);display:flex;align-items:center;gap:14px;transform:translateY(120%);transition:transform .45s var(--ease)}
.bar.show{transform:translateY(0)}
@media(min-width:1024px){.bar{display:none}}
.bar-info{flex:1;color:#fff}
.bar-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:rgba(255,255,255,.5)}
.bar-total{font-family:'Space Grotesk';font-size:24px;font-weight:700;letter-spacing:-.5px}
.bar-btn{display:flex;align-items:center;gap:8px;padding:12px 20px;border-radius:var(--r);background:var(--primary);color:#fff;font-size:14px;font-weight:700;transition:transform .15s var(--spring);white-space:nowrap}
.bar-btn:active{transform:scale(.96)}

/* ═══ DESKTOP CART SUMMARY (sidebar-style) ═══ */
.desk-cart{display:none}
@media(min-width:1024px){
  .desk-cart{display:block;position:fixed;bottom:32px;right:32px;z-index:60;background:var(--dark);color:#fff;padding:16px 20px;border-radius:var(--r-lg);box-shadow:var(--shadow-lg);transform:translateY(120px);opacity:0;transition:transform .4s var(--ease),opacity .3s;min-width:280px}
  .desk-cart.show{transform:translateY(0);opacity:1}
  .desk-cart-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .desk-cart-label{font-size:12px;font-weight:600;color:rgba(255,255,255,.5)}
  .desk-cart-total{font-family:'Space Grotesk';font-size:28px;font-weight:700;letter-spacing:-.5px}
  .desk-cart-btn{width:100%;padding:12px;border-radius:var(--r);background:var(--primary);color:#fff;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .15s}
  .desk-cart-btn:hover{background:var(--primary-hover)}
}

/* ═══ BOTTOM NAV (mobile only) ═══ */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:50;display:flex;justify-content:space-around;padding:6px 8px calc(8px + env(safe-area-inset-bottom));background:rgba(255,255,255,.96);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid var(--n200);transition:transform .35s var(--ease)}
.bnav.hide{transform:translateY(110%)}
@media(min-width:768px){.bnav{display:none}}
.ni{display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--n400);font-size:10px;font-weight:600;padding:5px 14px;border-radius:8px}
.ni.cur{color:var(--primary)}
.ni svg{width:20px;height:20px}

/* ═══ OVERLAY + DRAWER ═══ */
.overlay{position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.55);opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(4px)}
.overlay.on{opacity:1;pointer-events:all}

.drawer{position:fixed;z-index:90;background:var(--surface);transition:transform .4s var(--ease);box-shadow:var(--shadow-lg);display:flex;flex-direction:column}
/* Mobile: bottom sheet */
.drawer{bottom:0;left:0;right:0;border-radius:var(--r-xl) var(--r-xl) 0 0;max-height:92dvh;transform:translateY(105%)}
.drawer.on{transform:translateY(0)}
/* Desktop: side panel */
@media(min-width:768px){
  .drawer{top:0;right:0;bottom:0;left:auto;width:420px;border-radius:0;transform:translateX(105%)}
  .drawer.on{transform:translateX(0)}
}

.drw-handle{width:36px;height:4px;background:var(--n300);border-radius:2px;margin:10px auto 0}
@media(min-width:768px){.drw-handle{display:none}}
.drw-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 0}
@media(min-width:768px){.drw-head{padding:24px 24px 0}}
.drw-title{font-family:'Space Grotesk';font-size:20px;font-weight:700;letter-spacing:-.3px}
.drw-close{width:32px;height:32px;border-radius:50%;background:var(--n100);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--n600);transition:transform .15s var(--spring)}
.drw-close:active{transform:scale(.88)}
.drw-body{flex:1;overflow-y:auto;padding:16px 20px 0;overscroll-behavior:contain}
@media(min-width:768px){.drw-body{padding:20px 24px 0}}
.drw-foot{padding:0 20px;padding-bottom:max(env(safe-area-inset-bottom),20px);flex-shrink:0}
@media(min-width:768px){.drw-foot{padding:0 24px 24px}}

/* Cart items */
.ci{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid var(--n100)}
.ci:last-of-type{border-bottom:none}
.ci-img{width:56px;height:56px;border-radius:var(--r);object-fit:contain;flex-shrink:0;background:var(--n50);padding:4px}
.ci-info{flex:1;min-width:0}
.ci-name{font-family:'Space Grotesk';font-size:14px;font-weight:700}
.ci-det{font-size:12px;color:var(--n500);margin-top:2px}
.ci-price{font-family:'Space Grotesk';font-size:15px;font-weight:700;color:var(--green);flex-shrink:0}
.ci-del{width:28px;height:28px;border-radius:50%;background:var(--n100);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--n400);font-size:14px;transition:all .15s;margin-left:4px}
.ci-del:hover{background:#FEE2E2;color:#EF4444}

.tot{display:flex;justify-content:space-between;align-items:center;padding:16px 0 10px;margin-top:8px;border-top:2px solid var(--n100)}
.tot-label{font-size:14px;font-weight:600;color:var(--n500)}
.tot-value{font-family:'Space Grotesk';font-size:28px;font-weight:700;letter-spacing:-.6px}

.del-box{background:var(--green-light);border-radius:var(--r);padding:14px;margin:12px 0 16px;display:flex;gap:10px}
.del-box .ico{font-size:20px;flex-shrink:0}
.del-box .txt{font-size:13px;color:var(--n600);line-height:1.5}
.del-box .txt strong{color:var(--n900);display:block;margin-bottom:2px}

.fl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--n500);display:block;margin-bottom:5px}
.fi{width:100%;padding:12px 14px;background:var(--n100);border:2px solid transparent;border-radius:var(--r);font-size:14px;font-weight:500;color:var(--n900);outline:none;transition:border-color .2s,background .2s;margin-bottom:12px;-webkit-appearance:none;resize:none}
.fi:focus{border-color:var(--primary);background:var(--surface)}
.fi.err{border-color:#EF4444;animation:shake .35s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

.send-btn{width:100%;padding:16px;border-radius:var(--r);background:var(--wa);color:#fff;font-size:16px;font-weight:800;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 4px 16px rgba(37,211,102,.25);margin-bottom:6px;transition:transform .15s var(--spring)}
.send-btn:hover{box-shadow:0 6px 20px rgba(37,211,102,.35)}
.send-btn:active{transform:scale(.97)}
.send-btn svg{width:20px;height:20px}
.send-note{text-align:center;font-size:12px;color:var(--n400);font-weight:600;padding-bottom:8px}

.empty{text-align:center;padding:48px 0;display:flex;flex-direction:column;align-items:center;gap:6px}
.empty-ico{font-size:48px;opacity:.3}
.empty p{font-family:'Space Grotesk';font-size:16px;font-weight:700;color:var(--n600)}
.empty span{font-size:13px;color:var(--n400)}

.toast{position:fixed;top:72px;left:50%;transform:translateX(-50%) translateY(-10px);z-index:200;background:var(--dark);color:#fff;padding:10px 20px;border-radius:var(--r-full);font-size:13px;font-weight:600;opacity:0;pointer-events:none;transition:opacity .2s,transform .3s var(--spring);white-space:nowrap}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <div class="hdr-inner">
    <div class="hdr-left">
      <a href="index.html" class="hdr-back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></a>
      <span class="hdr-brand">Estación Snack</span>

    <nav class="hdr-nav">

        <span class="hdr-badge" id="badge">0</span>
      </button>
    </div>
  </div>
</header>

<!-- TRUST -->
<div class="trust"><div class="trust-inner">
  <span>⚡ Despacho rápido</span><span>📦 Venta por kilo</span><span>📍 Santa Cruz</span><span>💬 Pedido por WhatsApp</span>
</div></div>

<main class="container">
  <!-- PAGE TOP -->
  <div class="page-top">
    <h1>Elige tu <em>snack.</em></h1>
    <p>Selecciona los kilos que quieras y te armamos el pedido directo al WhatsApp.</p>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <div class="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="Buscar producto..." oninput="onSearch(this.value)">
    </div>
    <div class="filters">
      <button class="pill on" data-cat="all">Todos</button>
      <button class="pill" data-cat="frutos">🥜 Frutos secos</button>
      <button class="pill" data-cat="dulces">🍬 Dulces</button>
    </div>
  </div>

  <!-- GRID -->
  <div class="grid" id="grid"></div>
</main>

<!-- MOBILE STICKY BAR -->
<div class="bar" id="bar">
  <div class="bar-info"><div class="bar-label">Total pedido</div><div class="bar-total" id="barTotal">$0</div></div>
  <button class="bar-btn" onclick="openDrawer()">Ver pedido →</button>
</div>

<!-- DESKTOP CART FLOAT -->
<div class="desk-cart" id="deskCart">
  <div class="desk-cart-row"><span class="desk-cart-label">Total pedido</span></div>
  <div class="desk-cart-total" id="deskTotal">$0</div>
  <button class="desk-cart-btn" onclick="openDrawer()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
    Ver pedido completo
  </button>
</div>

<!-- MOBILE BOTTOM NAV -->
<nav class="bnav" id="bnav">
  <a href="index.html" class="ni"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Inicio</a>
  <a href="catalogo.html" class="ni cur"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Catálogo</a>
  <a href="como-pedir.html" class="ni"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>Cómo pedir</a>
  <a href="https://wa.me/56953743338" target="_blank" class="ni"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>Pedir</a>
</nav>

<!-- OVERLAY + DRAWER -->
<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drw-handle"></div>
  <div class="drw-head"><span class="drw-title" id="drwTitle">Tu pedido</span><button class="drw-close" onclick="closeDrawer()">✕</button></div>
  <div class="drw-body" id="drwBody"></div>
  <div class="drw-foot" id="drwFoot"></div>
</div>
<div class="toast" id="toast"></div>

<script>
const WA='56953743338';
const P=[
  {id:'mix',cat:'frutos',tag:'Frutos secos',name:'Mix Europeo',copy:'Almendras, nueces, castañas y pasas',price:13000,stock:5,badge:'Más vendido',
   img:'https://www.elpalomo.cl/3484-large_default/mix-europeo-x-kilo.jpg'},
  {id:'tropical',cat:'dulces',tag:'Dulces',name:'Maní Confitado Tropical',copy:'Crujiente cobertura multicolor',price:5990,stock:5,badge:null,
   img:'https://www.elpalomo.cl/2744-large_default/mani-confitado-tropical-x-kilo.jpg'},
  {id:'rojo',cat:'dulces',tag:'Dulces',name:'Maní Confitado Rojo',copy:'El clásico que nunca falla',price:5990,stock:5,badge:null,
   img:'https://www.elpalomo.cl/2748-large_default/mani-confitado-natural-rojo-x-kilo.jpg'},
  {id:'chuby',cat:'dulces',tag:'Dulces',name:'Chuby Bardú',copy:'Gomitas blandas de colores',price:9990,stock:5,badge:'Popular',
   img:'https://www.elpalomo.cl/2873-large_default/chuby-bardu-x-kilo-.jpg'},
  {id:'gomita',cat:'dulces',tag:'Dulces',name:'Gomita Osito Docile',copy:'Los ositos que todos aman',price:8500,stock:5,badge:null,
   img:'https://www.elpalomo.cl/3183-large_default/gomita-osito-docile-x-kg.jpg'},
  {id:'almendra',cat:'frutos',tag:'Frutos secos',name:'Almendra Entera',copy:'Natural, crujiente y nutritiva',price:16000,stock:1,badge:'⚡ Últimas',
   img:'https://www.elpalomo.cl/3340-large_default/saco-almendra-enteras-x-10-kilos.jpg'},
];

let cart={},filter='all',search='',prevTotal=0;
const fmt=n=>'$'+n.toLocaleString('es-CL');
const getTotal=()=>Object.entries(cart).reduce((s,[id,kg])=>s+(P.find(p=>p.id===id)?.price||0)*kg,0);
const getTotalKg=()=>Object.values(cart).reduce((a,b)=>a+b,0);

function getVisible(){
  let list=filter==='all'?P:P.filter(p=>p.cat===filter);
  if(search){const q=search.toLowerCase();list=list.filter(p=>p.name.toLowerCase().includes(q)||p.copy.toLowerCase().includes(q));}
  return list;
}

function render(){
  const list=getVisible();
  document.getElementById('grid').innerHTML=list.map(p=>{
    const kg=cart[p.id]||0,active=kg>0;
    return `<div class="card${active?' in':''}" id="c-${p.id}">
      <div class="card-img">
        <div class="card-badges">
          <div class="card-check">✓</div>
          ${p.badge?`<span class="badge ${p.badge.includes('Últimas')?'badge-hot':'badge-stock'}">${p.badge}</span>`:`<span></span>`}
        </div>
        <img src="${p.img}" alt="${p.name}" loading="lazy">
      </div>
      <div class="card-body">
        <div class="card-cat">${p.tag}</div>
        <div class="card-name">${p.name}</div>
        <div class="card-copy">${p.copy}</div>
        <div class="card-price">${fmt(p.price)} <small>/kg</small></div>
        <div id="a-${p.id}">
        ${kg===0
          ?`<button class="btn-add" onclick="setKg('${p.id}',1)">+ Agregar al pedido</button>`
          :`<div class="stepper"><button class="stp-btn" onclick="setKg('${p.id}',${kg-1})">−</button><span class="stp-val" id="v-${p.id}">${kg} kg</span><button class="stp-btn" onclick="setKg('${p.id}',${kg+1})" ${kg>=p.stock?'disabled':''}>+</button></div>`}
        </div>
      </div>
      <div class="card-sub${active?' show':''}" id="s-${p.id}"><span>${kg} kg × ${fmt(p.price)}</span><span>${fmt(kg*p.price)}</span></div>
    </div>`;
  }).join('');
}

function setKg(id,val){
  const p=P.find(x=>x.id===id);val=Math.max(0,Math.min(p.stock,val));
  const was=cart[id]||0;if(!val)delete cart[id];else cart[id]=val;
  if(val>was)showToast(`${p.name} — ${val} kg`);
  render();updateBar();
}

function onSearch(q){search=q;render();}
document.querySelectorAll('.pill').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.pill').forEach(p=>p.classList.remove('on'));
    btn.classList.add('on');filter=btn.dataset.cat;render();
  });
});

function updateBar(){
  const kg=getTotalKg(),t=getTotal();animTotal(prevTotal,t);prevTotal=t;
  const b=document.getElementById('badge');b.textContent=kg;b.classList.toggle('show',kg>0);
  document.getElementById('bar').classList.toggle('show',kg>0);
  document.getElementById('bnav').classList.toggle('hide',kg>0);
  document.getElementById('deskCart').classList.toggle('show',kg>0);
  document.getElementById('deskTotal').textContent=fmt(t);
}
function animTotal(from,to){
  if(from===to)return;const el=document.getElementById('barTotal'),dur=280,t0=performance.now();
  const tick=now=>{const p=Math.min((now-t0)/dur,1);el.textContent=fmt(Math.round(from+(to-from)*(1-Math.pow(1-p,3))));if(p<1)requestAnimationFrame(tick);};
  requestAnimationFrame(tick);
}

function openDrawer(){document.getElementById('drawer').classList.add('on');document.getElementById('overlay').classList.add('on');document.body.style.overflow='hidden';renderDrawer();}
function closeDrawer(){document.getElementById('drawer').classList.remove('on');document.getElementById('overlay').classList.remove('on');document.body.style.overflow='';}

function renderDrawer(){
  const body=document.getElementById('drwBody'),foot=document.getElementById('drwFoot'),keys=Object.keys(cart);
  if(!keys.length){
    document.getElementById('drwTitle').textContent='Tu pedido';
    body.innerHTML=`<div class="empty"><div class="empty-ico">🛒</div><p>Nada por aquí todavía</p><span>Agrega productos del catálogo</span></div>`;foot.innerHTML='';return;
  }
  document.getElementById('drwTitle').textContent=getTotalKg()+' kg en tu pedido';
  body.innerHTML=keys.map(id=>{const p=P.find(x=>x.id===id),kg=cart[id];
    return `<div class="ci"><img class="ci-img" src="${p.img}" alt="${p.name}"><div class="ci-info"><div class="ci-name">${p.name}</div><div class="ci-det">${kg} kg × ${fmt(p.price)}</div></div><div class="ci-price">${fmt(kg*p.price)}</div><button class="ci-del" onclick="delItem('${id}')">✕</button></div>`;
  }).join('')+`<div class="tot"><span class="tot-label">Total a pagar</span><span class="tot-value">${fmt(getTotal())}</span></div>
  <div class="del-box"><span class="ico">🚗</span><div class="txt"><strong>Despacho en Santa Cruz</strong>Martes y viernes · Transferencia o efectivo</div></div>
  <label class="fl">Tu nombre</label><input class="fi" id="fN" type="text" placeholder="Ej: María González" autocomplete="name">
  <label class="fl">Dirección</label><input class="fi" id="fD" type="text" placeholder="Ej: Los Aromos 234" autocomplete="street-address">
  <label class="fl">Nota (opcional)</label><textarea class="fi" id="fNo" rows="2" placeholder="Horario, instrucciones..."></textarea>`;
  foot.innerHTML=`<button class="send-btn" onclick="send()"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51l-.57-.01c-.198 0-.52.074-.792.372s-1.04 1.016-1.04 2.479c0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>Enviar pedido por WhatsApp</button><div class="send-note">⚡ Te respondemos en menos de 1 hora</div>`;
}
function delItem(id){delete cart[id];updateBar();render();renderDrawer();}

function send(){
  const n=document.getElementById('fN')?.value.trim(),d=document.getElementById('fD')?.value.trim(),no=document.getElementById('fNo')?.value.trim();
  if(!n){fErr('fN');showToast('Escribe tu nombre');return;}
  if(!d){fErr('fD');showToast('Escribe tu dirección');return;}
  const L=['🌰 *PEDIDO ESTACIÓN SNACK*',''];
  Object.entries(cart).forEach(([id,kg])=>{const p=P.find(x=>x.id===id);L.push(`• ${p.name}: *${kg} kg* → ${fmt(kg*p.price)}`);});
  L.push('',`*TOTAL: ${fmt(getTotal())}*`,'',`👤 *Nombre:* ${n}`,`📍 *Dirección:* ${d}`);
  if(no)L.push(`📝 *Nota:* ${no}`);L.push('','_Pago: transferencia o efectivo ✅_');
  window.open(`https://wa.me/${WA}?text=${encodeURIComponent(L.join('\n'))}`,'_blank');
}
function fErr(id){const el=document.getElementById(id);if(!el)return;el.classList.add('err');el.focus();setTimeout(()=>el.classList.remove('err'),800);}
let _tt;function showToast(m){const t=document.getElementById('toast');t.textContent='✓ '+m;t.classList.add('on');clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('on'),2000);}

render();
</script>
</body>
</html>
