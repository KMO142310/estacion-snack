<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Catálogo — Estación Snack</title>
<meta name="theme-color" content="#FAF7F2">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#FAF7F2;--text:#2C2416;--accent:#C8553D;--accent-hover:#B04530;
  --subtle:#A69580;--surface:#EEE8DF;--line:#DDD5CA;
  --green:#5C7A3E;--wa:#25D366
}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:15px;-webkit-font-smoothing:antialiased}
h1,h2,h3,.serif{font-family:'DM Serif Display',Georgia,serif;font-weight:400;letter-spacing:-.02em}
a{text-decoration:none;color:inherit;-webkit-tap-highlight-color:transparent}
button{font-family:inherit;border:none;cursor:pointer;-webkit-tap-highlight-color:transparent}
img{display:block;max-width:100%}

/* NAV */
nav{padding:16px 24px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;background:rgba(250,247,242,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
@media(min-width:768px){nav{padding:18px 48px}}
.nav-left{display:flex;align-items:center;gap:16px}
.nav-back{color:var(--subtle);display:flex;align-items:center}
.nav-back svg{width:20px;height:20px}
.nav-brand{font-family:'DM Serif Display',Georgia,serif;font-size:20px;color:var(--text)}
.nav-links{display:none;gap:32px}
@media(min-width:768px){.nav-links{display:flex}}
.nav-links a{font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--subtle);transition:color .15s}
.nav-links a:hover,.nav-links a.cur{color:var(--text)}
.nav-right{display:flex;align-items:center;gap:12px}
.nav-cart{position:relative;display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--text);background:none;padding:8px 0}
.nav-cart svg{width:20px;height:20px}
.nav-badge{background:var(--accent);color:#fff;font-size:10px;font-weight:700;min-width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:absolute;top:-2px;right:-8px;transform:scale(0);transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
.nav-badge.show{transform:scale(1)}
.nav-wa{display:none;font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--subtle);transition:color .15s}
.nav-wa:hover{color:var(--text)}
@media(min-width:768px){.nav-wa{display:block}}

/* MAIN */
main{max-width:1080px;margin:0 auto;padding:0 24px}
@media(min-width:768px){main{padding:0 48px}}

/* PAGE HEADER */
.page-hdr{padding:48px 0 24px;border-bottom:1px solid var(--line);margin-bottom:32px}
@media(min-width:768px){.page-hdr{padding:64px 0 32px;margin-bottom:48px}}
.page-hdr h1{font-size:clamp(36px,6vw,56px);line-height:1.05;margin-bottom:12px}
.page-hdr p{color:var(--subtle);font-size:15px;max-width:480px;line-height:1.6}

/* FILTERS */
.filters{display:flex;gap:12px;margin-bottom:32px;flex-wrap:wrap}
@media(min-width:768px){.filters{margin-bottom:48px}}
.pill{padding:8px 20px;font-size:12px;text-transform:uppercase;letter-spacing:.08em;font-weight:600;color:var(--subtle);background:transparent;border:1px solid var(--line);transition:all .15s}
.pill:hover{border-color:var(--text);color:var(--text)}
.pill.on{border-color:var(--text);color:var(--text);background:var(--text);color:var(--bg)}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:32px 16px;padding-bottom:120px}
@media(min-width:640px){.grid{grid-template-columns:repeat(3,1fr);gap:48px 24px}}
@media(min-width:1024px){.grid{gap:56px 32px;padding-bottom:80px}}

/* PRODUCT */
.product{cursor:pointer}
.product:hover .product-img img{transform:scale(1.03)}
.product-img{aspect-ratio:4/5;background:var(--surface);overflow:hidden;margin-bottom:14px;position:relative}
.product-img img{width:100%;height:100%;object-fit:contain;padding:16px;transition:transform .6s cubic-bezier(.32,.72,0,1)}
.product-badge{position:absolute;top:12px;left:12px;font-size:10px;text-transform:uppercase;letter-spacing:.1em;font-weight:700;color:var(--bg);background:var(--accent);padding:4px 10px}
.product-stock{position:absolute;top:12px;right:12px;font-size:10px;text-transform:uppercase;letter-spacing:.08em;font-weight:600;color:var(--subtle)}
.product-check{position:absolute;bottom:12px;right:12px;width:28px;height:28px;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:14px;font-weight:700;transform:scale(0);transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
.product.in .product-check{transform:scale(1)}
.product.in .product-img{outline:2px solid var(--green);outline-offset:-2px}

.product-cat{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--subtle);margin-bottom:4px}
.product-name{font-family:'DM Serif Display',Georgia,serif;font-size:18px;line-height:1.2;margin-bottom:4px}
@media(min-width:768px){.product-name{font-size:20px}}
.product-copy{font-size:13px;color:var(--subtle);margin-bottom:8px;line-height:1.4}
.product-price{font-size:14px;color:var(--subtle);margin-bottom:14px}
.product-price b{color:var(--text);font-size:16px;font-weight:600}

/* ADD BUTTON — outline style */
.btn-add{width:100%;padding:10px 16px;font-size:12px;text-transform:uppercase;letter-spacing:.08em;font-weight:600;background:transparent;border:1px solid var(--text);color:var(--text);transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-add:hover{background:var(--text);color:var(--bg)}

/* STEPPER */
.stepper{display:flex;align-items:center;width:100%;border:1px solid var(--text)}
.stp-btn{width:40px;height:38px;background:none;color:var(--text);font-size:18px;font-weight:500;display:flex;align-items:center;justify-content:center;transition:background .1s}
.stp-btn:hover{background:var(--surface)}
.stp-btn:disabled{opacity:.25;cursor:default}
.stp-val{flex:1;text-align:center;font-size:14px;font-weight:600}

/* SUBTOTAL */
.product-sub{display:flex;justify-content:space-between;margin-top:8px;font-size:12px;color:var(--green);font-weight:600;height:0;opacity:0;overflow:hidden;transition:all .3s}
.product-sub.show{height:18px;opacity:1}

/* ORDER BAR — mobile */
.order-bar{position:fixed;bottom:0;left:0;right:0;z-index:60;padding:16px 24px calc(16px + env(safe-area-inset-bottom));background:var(--text);color:var(--bg);display:flex;align-items:center;gap:16px;transform:translateY(110%);transition:transform .4s cubic-bezier(.32,.72,0,1)}
.order-bar.show{transform:translateY(0)}
@media(min-width:1024px){.order-bar{display:none}}
.order-bar-info{flex:1}
.order-bar-label{font-size:10px;text-transform:uppercase;letter-spacing:.1em;opacity:.5}
.order-bar-total{font-family:'DM Serif Display',Georgia,serif;font-size:24px}
.order-bar-btn{padding:12px 24px;background:var(--accent);color:#fff;font-size:12px;text-transform:uppercase;letter-spacing:.08em;font-weight:700;transition:background .15s;white-space:nowrap}
.order-bar-btn:hover{background:var(--accent-hover)}

/* DESKTOP ORDER FLOAT */
.desk-float{display:none}
@media(min-width:1024px){
  .desk-float{display:block;position:fixed;bottom:32px;right:48px;z-index:60;background:var(--text);color:var(--bg);padding:20px 24px;min-width:260px;transform:translateY(120px);opacity:0;transition:all .4s cubic-bezier(.32,.72,0,1)}
  .desk-float.show{transform:translateY(0);opacity:1}
  .desk-float-label{font-size:10px;text-transform:uppercase;letter-spacing:.1em;opacity:.5;margin-bottom:4px}
  .desk-float-total{font-family:'DM Serif Display',Georgia,serif;font-size:28px;margin-bottom:12px}
  .desk-float-btn{width:100%;padding:12px;background:var(--accent);color:#fff;font-size:12px;text-transform:uppercase;letter-spacing:.08em;font-weight:700;text-align:center;display:block;transition:background .15s}
  .desk-float-btn:hover{background:var(--accent-hover)}
}

/* MOBILE NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:50;display:flex;justify-content:space-around;padding:8px 8px calc(8px + env(safe-area-inset-bottom));background:rgba(250,247,242,.95);backdrop-filter:blur(12px);border-top:1px solid var(--line);transition:transform .3s}
.bnav.hide{transform:translateY(110%)}
@media(min-width:768px){.bnav{display:none}}
.ni{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;font-weight:600;color:var(--subtle);padding:4px 12px;letter-spacing:.02em}
.ni.cur{color:var(--accent)}
.ni svg{width:18px;height:18px}

/* OVERLAY + DRAWER */
.overlay{position:fixed;inset:0;z-index:80;background:rgba(44,36,22,.4);opacity:0;pointer-events:none;transition:opacity .3s}
.overlay.on{opacity:1;pointer-events:all}
.drawer{position:fixed;z-index:90;background:var(--bg);display:flex;flex-direction:column;transition:transform .4s cubic-bezier(.32,.72,0,1)}
.drawer{bottom:0;left:0;right:0;max-height:90dvh;transform:translateY(105%)}
.drawer.on{transform:translateY(0)}
@media(min-width:768px){.drawer{top:0;right:0;bottom:0;left:auto;width:440px;max-height:none;transform:translateX(105%);border-left:1px solid var(--line)}.drawer.on{transform:translateX(0)}}

.drw-head{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--line)}
.drw-title{font-family:'DM Serif Display',Georgia,serif;font-size:22px}
.drw-close{width:32px;height:32px;display:flex;align-items:center;justify-content:center;background:none;font-size:20px;color:var(--subtle)}
.drw-body{flex:1;overflow-y:auto;padding:24px;overscroll-behavior:contain}
.drw-foot{padding:16px 24px calc(env(safe-area-inset-bottom,16px) + 16px);border-top:1px solid var(--line)}

/* CART ITEMS */
.ci{display:flex;gap:14px;padding:16px 0;border-bottom:1px solid var(--line)}
.ci:last-of-type{border:none}
.ci-img{width:64px;height:80px;object-fit:contain;flex-shrink:0;background:var(--surface);padding:4px}
.ci-info{flex:1;min-width:0}
.ci-name{font-family:'DM Serif Display',Georgia,serif;font-size:16px;margin-bottom:2px}
.ci-det{font-size:13px;color:var(--subtle)}
.ci-right{display:flex;flex-direction:column;align-items:flex-end;justify-content:space-between;flex-shrink:0}
.ci-price{font-size:14px;font-weight:600}
.ci-del{font-size:12px;color:var(--subtle);background:none;padding:4px;transition:color .15s}
.ci-del:hover{color:var(--accent)}

.tot{display:flex;justify-content:space-between;align-items:baseline;padding:20px 0 16px;border-top:1px solid var(--text)}
.tot-label{font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--subtle)}
.tot-value{font-family:'DM Serif Display',Georgia,serif;font-size:32px}

.del-box{background:var(--surface);padding:16px;margin:16px 0;font-size:13px;color:var(--subtle);line-height:1.5}
.del-box strong{color:var(--text);display:block;margin-bottom:2px;font-size:14px}

.fl{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--subtle);font-weight:600;display:block;margin-bottom:5px}
.fi{width:100%;padding:12px;background:var(--surface);border:1px solid var(--line);font-size:14px;color:var(--text);outline:none;margin-bottom:14px;transition:border-color .2s;font-family:inherit}
.fi:focus{border-color:var(--text)}
.fi.err{border-color:var(--accent);animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}

.send-btn{width:100%;padding:16px;background:var(--wa);color:#fff;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:10px;letter-spacing:.02em;transition:opacity .15s}
.send-btn:hover{opacity:.9}
.send-btn svg{width:20px;height:20px}
.send-note{text-align:center;font-size:12px;color:var(--subtle);margin-top:8px}

.empty{text-align:center;padding:48px 0;color:var(--subtle)}
.empty p{font-family:'DM Serif Display',Georgia,serif;font-size:18px;color:var(--text);margin-bottom:4px}
.empty span{font-size:13px}

.toast{position:fixed;top:72px;left:50%;transform:translateX(-50%) translateY(-10px);z-index:200;background:var(--text);color:var(--bg);padding:10px 24px;font-size:13px;font-weight:500;opacity:0;transition:all .3s;white-space:nowrap}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<nav>
  <div class="nav-left">
    <a href="index.html" class="nav-back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg></a>
    <a href="index.html" class="nav-brand">Estación Snack</a>
  </div>
  <div class="nav-links">
    <a href="index.html">Inicio</a>
    <a href="catalogo.html" class="cur">Catálogo</a>
    <a href="como-pedir.html">Cómo pedir</a>
  </div>
  <div class="nav-right">
    <a href="https://wa.me/56953743338" target="_blank" class="nav-wa">WhatsApp</a>
    <button class="nav-cart" onclick="openDrawer()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
      <span class="nav-badge" id="badge">0</span>
    </button>
  </div>
</nav>

<main>
  <div class="page-hdr">
    <h1>Catálogo</h1>
    <p>Frutos secos, confites y dulces por kilo. Selecciona lo que quieras y te armamos el pedido por WhatsApp.</p>
  </div>

  <div class="filters">
    <button class="pill on" data-cat="all">Todo</button>
    <button class="pill" data-cat="frutos">Frutos secos</button>
    <button class="pill" data-cat="dulces">Dulces</button>
  </div>

  <div class="grid" id="grid"></div>
</main>

<div class="order-bar" id="bar">
  <div class="order-bar-info"><div class="order-bar-label">Total</div><div class="order-bar-total" id="barTotal">$0</div></div>
  <button class="order-bar-btn" onclick="openDrawer()">Ver pedido →</button>
</div>

<div class="desk-float" id="deskFloat">
  <div class="desk-float-label">Total del pedido</div>
  <div class="desk-float-total" id="deskTotal">$0</div>
  <button class="desk-float-btn" onclick="openDrawer()">Ver pedido →</button>
</div>

<nav class="bnav" id="bnav">
  <a href="index.html" class="ni"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Inicio</a>
  <a href="catalogo.html" class="ni cur"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Catálogo</a>
  <a href="como-pedir.html" class="ni"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>Info</a>
  <a href="https://wa.me/56953743338" target="_blank" class="ni"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>Pedir</a>
</nav>

<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drw-head"><span class="drw-title" id="drwTitle">Tu pedido</span><button class="drw-close" onclick="closeDrawer()">✕</button></div>
  <div class="drw-body" id="drwBody"></div>
  <div class="drw-foot" id="drwFoot"></div>
</div>
<div class="toast" id="toast"></div>

<script>
const WA='56953743338';
const P=[
  {id:'mix',cat:'frutos',tag:'Frutos secos',name:'Mix Europeo',copy:'Almendras, nueces, castañas y pasas',price:13000,stock:5,badge:'Más vendido',img:'https://www.elpalomo.cl/3484-large_default/mix-europeo-x-kilo.jpg'},
  {id:'tropical',cat:'dulces',tag:'Dulces',name:'Maní Confitado Tropical',copy:'Crujiente cobertura multicolor',price:5990,stock:5,badge:null,img:'https://www.elpalomo.cl/2744-large_default/mani-confitado-tropical-x-kilo.jpg'},
  {id:'rojo',cat:'dulces',tag:'Dulces',name:'Maní Confitado Rojo',copy:'El clásico que nunca falla',price:5990,stock:5,badge:null,img:'https://www.elpalomo.cl/2748-large_default/mani-confitado-natural-rojo-x-kilo.jpg'},
  {id:'chuby',cat:'dulces',tag:'Dulces',name:'Chuby Bardú',copy:'Gomitas blandas de todos los colores',price:9990,stock:5,badge:'Popular',img:'https://www.elpalomo.cl/2873-large_default/chuby-bardu-x-kilo-.jpg'},
  {id:'gomita',cat:'dulces',tag:'Dulces',name:'Gomita Osito Docile',copy:'Los ositos de goma que todos aman',price:8500,stock:5,badge:null,img:'https://www.elpalomo.cl/3183-large_default/gomita-osito-docile-x-kg.jpg'},
  {id:'almendra',cat:'frutos',tag:'Frutos secos',name:'Almendra Entera',copy:'Natural, crujiente y nutritiva',price:16000,stock:1,badge:'Últimas unidades',img:'https://www.elpalomo.cl/3340-large_default/saco-almendra-enteras-x-10-kilos.jpg'},
];
let cart={},filter='all',prevTotal=0;
const fmt=n=>'$'+n.toLocaleString('es-CL');
const total=()=>Object.entries(cart).reduce((s,[id,kg])=>s+(P.find(p=>p.id===id)?.price||0)*kg,0);
const totalKg=()=>Object.values(cart).reduce((a,b)=>a+b,0);

function render(){
  const list=filter==='all'?P:P.filter(p=>p.cat===filter);
  document.getElementById('grid').innerHTML=list.map(p=>{
    const kg=cart[p.id]||0;
    return `<div class="product${kg?' in':''}" id="c-${p.id}">
      <div class="product-img">
        ${p.badge?`<div class="product-badge">${p.badge}</div>`:''}
        <div class="product-stock">${p.stock} kg disp.</div>
        <div class="product-check">✓</div>
        <img src="${p.img}" alt="${p.name}" loading="lazy">
      </div>
      <div class="product-cat">${p.tag}</div>
      <div class="product-name">${p.name}</div>
      <div class="product-copy">${p.copy}</div>
      <div class="product-price"><b>${fmt(p.price)}</b> / kg</div>
      <div id="a-${p.id}">
      ${kg===0
        ?`<button class="btn-add" onclick="setKg('${p.id}',1)">Agregar al pedido</button>`
        :`<div class="stepper"><button class="stp-btn" onclick="setKg('${p.id}',${kg-1})">−</button><span class="stp-val">${kg} kg</span><button class="stp-btn" onclick="setKg('${p.id}',${kg+1})" ${kg>=p.stock?'disabled':''}>+</button></div>`}
      </div>
      <div class="product-sub${kg?' show':''}" id="s-${p.id}"><span>${kg} kg × ${fmt(p.price)}</span><span>${fmt(kg*p.price)}</span></div>
    </div>`;}).join('');
}

function setKg(id,val){const p=P.find(x=>x.id===id);val=Math.max(0,Math.min(p.stock,val));const was=cart[id]||0;if(!val)delete cart[id];else cart[id]=val;if(val>was)showToast(`${p.name} — ${val} kg`);render();updateUI();}

document.querySelectorAll('.pill').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.pill').forEach(p=>p.classList.remove('on'));btn.classList.add('on');filter=btn.dataset.cat;render();});});

function updateUI(){
  const kg=totalKg(),t=total();
  const b=document.getElementById('badge');b.textContent=kg;b.classList.toggle('show',kg>0);
  document.getElementById('bar').classList.toggle('show',kg>0);
  document.getElementById('bnav').classList.toggle('hide',kg>0);
  document.getElementById('deskFloat').classList.toggle('show',kg>0);
  document.getElementById('deskTotal').textContent=fmt(t);
  animTotal(prevTotal,t);prevTotal=t;
}
function animTotal(from,to){if(from===to)return;const el=document.getElementById('barTotal'),dur=250,t0=performance.now();const tick=now=>{const p=Math.min((now-t0)/dur,1);el.textContent=fmt(Math.round(from+(to-from)*(1-Math.pow(1-p,3))));if(p<1)requestAnimationFrame(tick);};requestAnimationFrame(tick);}

function openDrawer(){document.getElementById('drawer').classList.add('on');document.getElementById('overlay').classList.add('on');document.body.style.overflow='hidden';renderDrawer();}
function closeDrawer(){document.getElementById('drawer').classList.remove('on');document.getElementById('overlay').classList.remove('on');document.body.style.overflow='';}

function renderDrawer(){
  const body=document.getElementById('drwBody'),foot=document.getElementById('drwFoot'),keys=Object.keys(cart);
  if(!keys.length){document.getElementById('drwTitle').textContent='Tu pedido';body.innerHTML=`<div class="empty"><p>Tu pedido está vacío</p><span>Agrega productos del catálogo</span></div>`;foot.innerHTML='';return;}
  document.getElementById('drwTitle').textContent=totalKg()+' kg en tu pedido';
  body.innerHTML=keys.map(id=>{const p=P.find(x=>x.id===id),kg=cart[id];
    return `<div class="ci"><img class="ci-img" src="${p.img}" alt="${p.name}"><div class="ci-info"><div class="ci-name">${p.name}</div><div class="ci-det">${kg} kg × ${fmt(p.price)}</div></div><div class="ci-right"><div class="ci-price">${fmt(kg*p.price)}</div><button class="ci-del" onclick="delItem('${id}')">Quitar</button></div></div>`;
  }).join('')+`<div class="tot"><span class="tot-label">Total</span><span class="tot-value">${fmt(total())}</span></div>
  <div class="del-box"><strong>🚗 Despacho en Santa Cruz</strong>Martes y viernes · Pago por transferencia o efectivo</div>
  <label class="fl">Nombre</label><input class="fi" id="fN" type="text" placeholder="María González" autocomplete="name">
  <label class="fl">Dirección</label><input class="fi" id="fD" type="text" placeholder="Los Aromos 234, Santa Cruz" autocomplete="street-address">
  <label class="fl">Nota (opcional)</label><textarea class="fi" id="fNo" rows="2" placeholder="Horario, instrucciones..."></textarea>`;
  foot.innerHTML=`<button class="send-btn" onclick="send()"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51l-.57-.01c-.198 0-.52.074-.792.372s-1.04 1.016-1.04 2.479c0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>Enviar por WhatsApp</button><div class="send-note">Respondemos en menos de 1 hora</div>`;
}
function delItem(id){delete cart[id];updateUI();render();renderDrawer();}
function send(){
  const n=document.getElementById('fN')?.value.trim(),d=document.getElementById('fD')?.value.trim(),no=document.getElementById('fNo')?.value.trim();
  if(!n){fErr('fN');showToast('Escribe tu nombre');return;}if(!d){fErr('fD');showToast('Escribe tu dirección');return;}
  const L=['🌰 *PEDIDO ESTACIÓN SNACK*',''];Object.entries(cart).forEach(([id,kg])=>{const p=P.find(x=>x.id===id);L.push(`• ${p.name}: *${kg} kg* → ${fmt(kg*p.price)}`);});
  L.push('',`*TOTAL: ${fmt(total())}*`,'',`👤 ${n}`,`📍 ${d}`);if(no)L.push(`📝 ${no}`);L.push('','_Transferencia o efectivo ✅_');
  window.open(`https://wa.me/${WA}?text=${encodeURIComponent(L.join('\n'))}`,'_blank');
}
function fErr(id){const el=document.getElementById(id);if(!el)return;el.classList.add('err');el.focus();setTimeout(()=>el.classList.remove('err'),800);}
let _tt;function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('on');clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('on'),2000);}
render();
</script>
</body>
</html>
